# Decap CMS Configuration
# 詳細: https://decapcms.org/docs/configuration-options/

# =============================================================================
# バックエンド設定（GitHub OAuth）
# =============================================================================
backend:
  name: github
  repo: rrukuu/1804site
  branch: main
  base_url: https://1804site.pages.dev
  auth_endpoint: /api/auth

# =============================================================================
# メディア設定（ローカル画像管理）
# =============================================================================
media_folder: public/images/products
public_folder: /images/products

media_library:
  max_file_size: 5242880

# =============================================================================
# ローカル開発用
# =============================================================================
local_backend: true

# =============================================================================
# UI設定
# =============================================================================
locale: ja
display_url: https://1804site.pages.dev
logo_url: /favicon.svg

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: "-"

# =============================================================================
# コレクション定義
# =============================================================================
collections:
  - name: products
    label: 商品
    label_singular: 商品
    folder: src/content/products
    create: true
    delete: true
    extension: md
    format: yaml-frontmatter
    slug: "{{slug}}"

    sortable_fields:
      - updatedAt
      - priority
      - price
      - title
      - status

    summary: "{{title}} - ¥{{price}} [{{status}}] {{category}}"

    fields:
      - name: id
        label: ID
        widget: string
        pattern: ["^[a-z0-9_]+$", "英小文字・数字・アンダースコアのみ"]
        hint: "例: prod_001（変更不可）"
        required: true

      - name: title
        label: 商品名
        widget: string
        required: true

      - name: slug
        label: URL用ID（半角英数とハイフン）
        widget: string
        pattern: ["^[a-z0-9-]+$", "英小文字・数字・ハイフンのみ"]
        hint: "例: vintage-seiko-watch"
        required: true

      - name: price
        label: 価格（税込）
        widget: number
        value_type: int
        min: 0
        required: true

      - name: category
        label: カテゴリ
        widget: select
        options:
          - { label: "🔮 オーブアカウント販売", value: "orb-account" }
          - { label: "⚡ 代行", value: "boosting" }
          - { label: "💪 その他アカウント販売", value: "strong-account" }
        default: orb-account
        required: true

      - name: status
        label: ステータス
        widget: select
        options:
          - { label: "✅ 販売中", value: "active" }
          - { label: "⏸️ 取り置き中", value: "reserved" }
          - { label: "🏷️ 売却済", value: "sold" }
          - { label: "👁️‍🗨️ 非表示", value: "hidden" }
          - { label: "📝 下書き", value: "draft" }
        default: draft
        required: true

      - name: description
        label: 概要説明
        widget: text
        required: true
        hint: "一覧・詳細のサマリー（200文字以内推奨）"

      - name: coverImage
        label: カバー画像
        widget: image
        required: true
        hint: "正方形推奨、1200x1200px以上"

      - name: images
        label: 追加画像
        widget: list
        required: false
        field:
          name: image
          label: 画像
          widget: image

      - name: tags
        label: タグ
        widget: list
        required: false
        hint: "カテゴリ・ブランド名など"

      - name: orbCount
        label: オーブ数
        widget: number
        value_type: int
        min: 0
        required: false
        hint: "オーブアカウント販売の場合に入力"

      - name: discount
        label: 割引率（%）
        widget: number
        value_type: int
        min: 0
        max: 100
        required: false
        default: 0
        hint: "0-100の整数。例: 20 = 20%OFF。0または未入力は割引なし"

      - name: purchaseUrl
        label: 購入ページURL
        widget: string
        required: false
        pattern: ["^https?://.+", "http(s)://で始めてください"]
        hint: "メルカリ、BASE等のURL"

      - name: priority
        label: 表示優先度
        widget: number
        value_type: int
        min: 0
        max: 100
        default: 50
        hint: "0-100、大きいほど上位表示"

      - name: publishedAt
        label: 公開日時
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: HH:mm
        required: true

      - name: updatedAt
        label: 更新日時
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: HH:mm
        required: true

      - name: notes
        label: 非公開メモ
        widget: text
        required: false
        hint: "⚠️ このメモは公開サイトには表示されません。仕入れ情報等を記録できます。"

      - name: body
        label: 詳細説明
        widget: markdown
        required: false
        hint: "商品の詳細説明（Markdown形式）"
